services:
  web:
    build: .
    image: short_link_web
    environment:
      DATABASE_URL: postgres://short_link:password@db:5432/short_link_database
      RAILS_ENV: ${RAILS_ENV}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: short_link_database
      POSTGRES_USER: short_link
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U short_link -d short_link_database"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
